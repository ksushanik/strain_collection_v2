name: Build & Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:  # allow manual rebuild without a code change

# Don't share concurrency with ci.yml — they're orthogonal.
# cancel-in-progress so a rapid second push to main doesn't waste a
# half-finished build job. Safe because images are idempotent.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # required for ghcr.io push via GITHUB_TOKEN

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/ksushanik/strain-collection-v2-backend:latest
            ghcr.io/ksushanik/strain-collection-v2-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: .   # frontend Dockerfile expects repo root for docs/wiki copy
          file: frontend/Dockerfile
          push: true
          # Intentionally NOT passing NEXT_PUBLIC_API_URL: the empty default in
          # frontend/Dockerfile lets the bundle resolve API_URL at runtime from
          # window.location.origin, so one image works for both prod and demo
          # hosts without rebuilding.
          tags: |
            ghcr.io/ksushanik/strain-collection-v2-frontend:latest
            ghcr.io/ksushanik/strain-collection-v2-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
