name: CI

on:
  push:
  pull_request:

# Cancel older runs on the same branch when a new push lands.
# Safe for pure CI; if a deploy job is added later it MUST opt out
# of cancellation (e.g. by using a different concurrency group).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: strain_collection_v2
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/strain_collection_v2?schema=public
      SKIP_ADMIN: "true"
      JWT_SECRET: "ci-test-secret"
      ADMIN_SESSION_SECRET: "ci-test-admin-secret"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Prisma generate
        working-directory: backend
        run: npx prisma generate

      - name: Run migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Lint backend
        working-directory: backend
        run: npm run lint -- --max-warnings=0

      # `nest build` runs tsc with tsconfig.build.json — strict mode, no
      # transpileOnly. Catches TS errors that lint and ts-jest tolerate
      # (e.g. TS2588 const reassignment, which slipped through to build.yml
      # in the CI/CD rollout because this step didn't exist).
      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Test backend
        working-directory: backend
        run: npm run test -- --runInBand

      - name: E2E backend
        working-directory: backend
        run: npm run test:e2e -- --runInBand

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_API_URL: http://localhost:3010
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      # `next build` does strict typecheck and full prod bundle. Ловит
      # SSR/RSC-специфические TS-ошибки, которые lint и dev server пропускают.
      # Кэш Next.js использует node_modules + cache: npm выше, повторные ранs
      # быстрее за счёт кэша pages/.next-cache (если будет добавлен позже).
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Frontend e2e smokes
        working-directory: frontend
        run: npm run test:e2e -- --reporter=line
